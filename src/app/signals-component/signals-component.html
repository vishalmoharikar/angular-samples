<div class="container mt-4">

        <h3 class="mb-3">Signals Demo</h3>
        <div class="btn-group mb-3" role="group">
            <button class="btn btn-outline-primary" (click)="changeUser('User-1')">User-1</button>
            <button class="btn btn-outline-primary" (click)="changeUser('User-2')">User-2</button>
            <button class="btn btn-outline-primary" (click)="changeUser('User-3')">User-3</button>

<div class="card my-4 p-3">
    <div class="card-body">
        <button type="button" class="btn btn-primary me-2" (click)="refresh()">Refresh</button>

        <div class="mt-3">
            <h5>Interval: {{ intervalStreamValue() }}</h5>
            <button type="button" class="btn btn-danger" (click)="onUnsubscribe()">Unsubscribe</button>
        </div>
        <hr>
        <div>
            <h5>Timer: {{ timerStreamValue() }}</h5>
            <button type="button" class="btn btn-danger" (click)="onUnsubscribeTimer()">Unsubscribe</button>
        </div>
    </div>
</div>

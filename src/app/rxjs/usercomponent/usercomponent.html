<div style="display: flex; gap: 20px; padding: 20px;">

    <div style="flex: 1; border: 1px solid #ccc; padding: 10px;">
        <h3>Users</h3>
        <input type="text" (input)="onSearch($event)" placeholder="Filter by name..."
            style="width: 100%; margin-bottom: 10px;">

        <ul style="list-style: none; padding: 0;">
            <li *ngFor="let user of users$ | async" (click)="onSelectUser(user.id)"
                style="cursor: pointer; padding: 8px; border-bottom: 1px solid #eee;">
                <strong>{{ user.name }}</strong> <br>
                <small>{{ user.email }}</small>
            </li>
        </ul>
    </div>

    <div style="flex: 2; border: 1px solid #ccc; padding: 10px;">
        <h3>Posts</h3>
        <div *ngIf="(posts$ | async) as posts; else loading">
            <div *ngFor="let post of posts"
                style="margin-bottom: 15px; border-left: 4px solid #007bff; padding-left: 10px;">
                <h4 style="margin: 0;">{{ post.title }}</h4>
                <p>{{ post.body }}</p>
            </div>
            <p *ngIf="posts.length === 0">No posts found or select a user.</p>
        </div>
        <ng-template #loading>Select a user to view their posts...</ng-template>
    </div>

</div>

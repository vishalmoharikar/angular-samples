<div class="card my-4">
    <div class="card-body">
        <h1 class="card-title">Promise Example</h1>

        <button class="btn btn-primary me-2" (click)="buyLaptop()">Buy Laptop (Promise)</button>
        <p class="mt-2">{{ result() }}</p>
        <hr />

        <button class="btn btn-primary me-2" (click)="buyLaptopAsyncAwait()">Buy Laptop (Async/Await)</button>
        <p class="mt-2">{{ resultAwait() }}</p>
        <hr />

        <button class="btn btn-primary me-2" (click)="fetchData()">Fetch Data (Fetch)</button>
        <p class="mt-2">{{ resultFetch() }}</p>
    </div>
</div>

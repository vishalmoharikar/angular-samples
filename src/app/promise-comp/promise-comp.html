<div class="my-4">
    <h1>Promise Example</h1>

    <button (click)="buyLaptop()">Buy Laptop (Promise)</button>
    <br>
    <p>{{ result ()}}</p>
    <hr />

    <button (click)="buyLaptopAsyncAwait()">Buy Laptop (Async/Await)</button>
    <br>
    <p>{{ resultAwait ()}}</p>

    <hr />

    <button (click)="fetchData()">Fetch Data (Fetch)</button>
    <br>
    <p>{{ resultFetch ()}}</p>


</div>

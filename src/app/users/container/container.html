<div class="card mx-auto" style="max-width: 600px;">
    <div class="card-body">
        <h2 class="card-title">User List</h2>
        <app-list [users]="users()" (selectUser)="handleUserSelection($event)"></app-list>

        <div class="input-group mt-3">
            <input type="text" class="form-control" placeholder="Add user..." [(ngModel)]="newUser" />
            <button class="btn btn-primary" (click)="addUser()">Add User</button>
        </div>
    </div>
</div>
